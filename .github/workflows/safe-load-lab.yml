name: Safe Load Lab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  safe-load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install CLI
        run: npm install -g .
        working-directory: safe-load-lab
      - name: Run controlled staging test
        run: |
          sll run \
            --config examples/advanced.json \
            --env staging \
            --i-own-this-target \
            --out reports/staging-report.json \
            --html reports/staging-report.html
        working-directory: safe-load-lab
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safe-load-lab-reports
          path: safe-load-lab/reports